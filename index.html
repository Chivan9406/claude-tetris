<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <label class="theme-toggle" title="Cambiar tema claro/oscuro">
    <input type="checkbox" id="theme-toggle-input" />
    <span class="theme-toggle-slider"></span>
  </label>

  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section leaderboard-section">
          <span class="label">RÉCORDS</span>
          <ol id="leaderboard-list" class="leaderboard-list"></ol>
          <button id="reset-scores-btn" class="reset-scores-btn">Reiniciar récords</button>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="name-entry" class="name-entry hidden">
          <label class="label" for="name-input">¡Nuevo récord! Ingresa tu nombre</label>
          <div class="name-entry-row">
            <input id="name-input" type="text" maxlength="12" placeholder="Jugador" autocomplete="off" />
            <button id="save-score-btn">Guardar</button>
          </div>
        </div>
        <ol id="overlay-leaderboard-list" class="leaderboard-list"></ol>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
